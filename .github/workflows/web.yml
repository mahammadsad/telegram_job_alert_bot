name: Website Tests and Cloudflare Pages
on:
  push: {branches: [main], paths: ['web/**', '.github/workflows/web.yml']}
  pull_request: {paths: ['web/**']}
  workflow_dispatch:
permissions: {contents: read}
concurrency: {group: "website-${{ github.ref }}", cancel-in-progress: true}
jobs:
  build:
    runs-on: ubuntu-latest
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
    defaults: {run: {working-directory: web}}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: {node-version: 22, cache: npm, cache-dependency-path: web/package-lock.json}
      - run: npm ci
      - run: npm test
      - run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ vars.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ vars.VITE_SUPABASE_ANON_KEY }}
          VITE_PUBLIC_WEBSITE_URL: ${{ vars.PUBLIC_WEBSITE_URL }}
          VITE_TELEGRAM_CHANNEL_URL: ${{ vars.VITE_TELEGRAM_CHANNEL_URL }}
      - uses: actions/upload-artifact@v4
        with: {name: website-dist, path: web/dist, retention-days: 7}
      - name: Deploy to Cloudflare Pages
        if: ${{ github.event_name != 'pull_request' && env.CLOUDFLARE_API_TOKEN != '' }}
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ env.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy web/dist --project-name=${{ vars.CLOUDFLARE_PAGES_PROJECT || 'sarkari-tathya-kendra' }}

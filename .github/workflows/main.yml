name: Government Information Pipeline
on:
  schedule:
    - cron: "0 2-14/2 * * *"
  workflow_dispatch:
    inputs:
      dry_run: {description: "Verify/render without production writes or Telegram", required: false, default: false, type: boolean}
permissions: {contents: read}
concurrency: {group: government-information-production, cancel-in-progress: false}
jobs:
  pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: "3.11", cache: pip}
      - run: pip install -r requirements.txt
      - name: Install Chromium and Bengali fonts
        run: |
          python -m playwright install --with-deps chromium
          sudo apt-get update
          sudo apt-get install -y fonts-noto-core fonts-noto-extra fonts-noto-color-emoji
      - run: pytest -q
      - name: Verify required production settings and database schema
        if: ${{ inputs.dry_run != true }}
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: python scripts/check_environment.py --production
      - name: Discover, verify, render and publish
        env:
          DATABASE_BACKEND: ${{ inputs.dry_run && 'sqlite' || 'supabase' }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHANNEL_ID: ${{ secrets.TELEGRAM_CHANNEL_ID }}
          TELEGRAM_REVIEW_CHAT_ID: ${{ secrets.TELEGRAM_REVIEW_CHAT_ID }}
          AI_PROVIDER: groq
          AI_API_KEY: ${{ secrets.AI_API_KEY }}
          AI_TEXT_MODEL: ${{ vars.AI_TEXT_MODEL }}
          AI_ENABLED: ${{ vars.AI_ENABLED || 'true' }}
          AI_DAILY_CALL_LIMIT: ${{ vars.AI_DAILY_CALL_LIMIT || '100' }}
          MAX_ITEMS_PER_RUN: ${{ vars.MAX_ITEMS_PER_RUN || '10' }}
          MAX_POSTS_PER_RUN: ${{ vars.MAX_POSTS_PER_RUN || '5' }}
          MAX_POSTS_PER_CATEGORY: ${{ vars.MAX_POSTS_PER_CATEGORY || '2' }}
          AUTO_POST_ENABLED: ${{ vars.AUTO_POST_ENABLED || 'true' }}
          PUBLIC_WEBSITE_URL: ${{ vars.PUBLIC_WEBSITE_URL }}
          DRY_RUN: ${{ inputs.dry_run || 'false' }}
        run: python app.py
      - name: Upload dry-run output
        if: ${{ inputs.dry_run }}
        uses: actions/upload-artifact@v4
        with: {name: dry-run-output, path: dry_run_output/, if-no-files-found: ignore, retention-days: 7}

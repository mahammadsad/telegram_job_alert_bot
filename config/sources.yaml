sources:
  - name: Karmasandhan
    url: https://www.karmasandhan.com/feed/
    parser_type: rss
    categories: [JOB]
    official: false
    discovery_only: true
    enabled: false
    allowed_domains: [karmasandhan.com]
    allowed_document_domains: [psc.wb.gov.in, prb.wb.gov.in, ssc.gov.in, upsc.gov.in]
    terms_reviewed: false
    article_inspection: false
    notes: "Disabled until robots.txt and terms are manually reviewed. Then enable full-article inspection."
    min_interval_minutes: 120
    request_timeout: 20
    max_items: 20

  # Disabled until each site's current listing selectors and terms have been
  # manually checked. Enabling a guessed scraper would create false notices.
  - name: West Bengal State Portal
    url: https://wb.gov.in/

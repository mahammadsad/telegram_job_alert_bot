sources:
  - name: Karmasandhan
    url: https://www.karmasandhan.com/feed/
    parser_type: rss
    categories: [JOB]
    official: false
    discovery_only: true
    enabled: true
    allowed_domains: [karmasandhan.com]
    allowed_document_domains: []
    min_interval_minutes: 120
    request_timeout: 20
    max_items: 20

  # Disabled until each site's current listing selectors and terms have been
  # manually checked. Enabling a guessed scraper would create false notices.
  - name: West Bengal State Portal
    url: https://wb.gov.in/
    parser_type: html
